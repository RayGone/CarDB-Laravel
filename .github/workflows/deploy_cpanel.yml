name: Deploy to CPanel

on:
  push:
    branches:
      - deploy-cpanel

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 'CPanel'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install PHP Dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.2
          dev: no
          args: --profile --ignore-platform-reqs --no-interaction --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache: 'npm'
          # cache-dependency-path: './package-lock.json'

      - name: Install Node Dependencies
        run: npm i

      - name: Make Frontend Build
        run: npm run build
        env:
          VITE_APP_NAME: ${{vars.APP_NAME}}
          VITE_PUSHER_APP_KEY: ${{secrets.PUSHER_APP_KEY}}
          VITE_PUSHER_HOST: ${{vars.PUSHER_HOST}}
          VITE_PUSHER_PORT: ${{vars.PUSHER_PORT}}
          VITE_PUSHER_SCHEME: ${{vars.PUSHER_SCHEME}}
          VITE_PUSHER_APP_CLUSTER: ${{vars.PUSHER_APP_CLUSTER}}

      - name: Directory Permissions
        run: |
          chmod -R 775 storage
          chmod -R 775 public


      - name: Setup Environment Variables
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate

      # - name: Clear Caches
      #   run: php artisan optimize:clear

      # - name: Storage link
      #   run: php artisan storage:link --force

      - name: ZIP Vendor
        run: zip -r vendor.zip vendor

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          protocol: ftps
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/favicon.ico
            **/resources/**
            **/tests/**
            **/stubs/**
            **/database/**
            **/vendor/**

