name: Deploy to GCloud Compute Enginge VM

on:
  push:
    branches:
      - triggers

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '$GCLOUD_SERVICE_ACCOUNT'
      env:
        GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}
        GCLOUD_ZONE: ${{ secrets.GCLOUD_ZONE }}
        GCLOUD_VM_INSTANCE: ${{ secrets.GCLOUD_VM_INSTANCE }}
        GCLOUD_SERVICE_ACCOUNT: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_EMAIL }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        version: 'latest'
        service_account_key: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
        project_id: ${{ secrets.GCLOUD_PROJECT_ID }}

    - name: 'Use gcloud CLI'
      run: 'gcloud info'

    - name: SSH and deploy
      run: |
        gcloud compute ssh --project=$GCLOUD_PROJECT_ID --zone=$GCLOUD_ZONE $GCLOUD_SERVICE_ACCOUNT@$GCLOUD_VM_INSTANCE --command="
        cd /path/to/your/project &&
        sudo git pull &&
        npm install &&
        npm run build &&
        pm2 start ./dist/index.js
        "
      env:
        GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}
        GCLOUD_ZONE: ${{ secrets.GCLOUD_ZONE }}
        GCLOUD_VM_INSTANCE: ${{ secrets.GCLOUD_VM_INSTANCE }}
        GCLOUD_SERVICE_ACCOUNT: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_EMAIL }}
